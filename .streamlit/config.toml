[theme]
primaryColor = "#3dffa0"
backgroundColor = "#0a0f0d"
secondaryBackgroundColor = "#1a2320"
textColor = "#e8f0ec"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "viewer"

[logger]
level = "info"

[server]
headless = true
port = 8501
enableCORS = true
enableXsrfProtection = true
